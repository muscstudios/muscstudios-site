<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Connect with Musc Studios. Curated designer and niche scents in Manila.">
    <title>Musc Studios | Connect</title>
    <link rel="stylesheet" href="../assets/style.css">
  </head>
  <body>
    <main class="page" aria-label="Musc Studios connect page">
      <section class="connect" aria-labelledby="connect-title">
        <header class="brand">
          <div class="logo-wrap">
            <img
              class="logo"
              src="../assets/logo.png"
              alt="Musc Studios"
              width="1200"
              height="708"
              decoding="async"
              onerror="this.hidden=true;this.nextElementSibling.hidden=false;"
            >
            <span class="logo-fallback" hidden>Musc Studios</span>
          </div>

          <p class="label" id="connect-title">CURATED LUXURY HOUSE</p>
          <p class="line">Curated designer &amp; niche&nbsp;scents.</p>
          <p class="subtext">Manila</p>
        </header>

        <nav class="links" aria-label="Contact links">
          <a class="button" href="https://instagram.com/muscstudios">Instagram &mdash; @muscstudios</a>
          <a class="button" href="https://facebook.com/muscstudios">Facebook &mdash; Musc Studios</a>
          <a class="button" href="mailto:support@muscstudios.com">Email &mdash; support@muscstudios.com</a>
        </nav>
      </section>
    </main>
  </body>
</html>
